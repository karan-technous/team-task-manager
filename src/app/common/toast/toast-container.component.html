<div
  class="toast-container"
  (mouseenter)="hovered.set(true)"
  (mouseleave)="hovered.set(false)"
>
  @for (toast of visibleToasts(); track toast.id; let i = $index) {
    <app-toast
      [toast]="toast"
      [index]="i"
      [hovered]="hovered()"
      [total]="totalCount()"
      (close)="toastService.remove(toast.id)"
    />
  }
</div>
